# Deploy Next static export to Cloudflare Worker `profile` (Static Assets), not Pages.
#
# GitHub repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — API token with Account → Workers Scripts → Edit (and Read).
#   CLOUDFLARE_ACCOUNT_ID — Workers & Pages overview → Account ID in the sidebar.
#
# Optional (same names as packages/profile/.env.example):
#   NEXT_PUBLIC_GTM_ID, NEXT_PUBLIC_CLARITY_ID
#
# Worker name is defined in packages/profile/wrangler.toml (`name = "profile"`).
#
# Wrangler is a root devDependency so cloudflare/wrangler-action can run `pnpm exec wrangler`
# without `pnpm add` (pnpm workspaces require -w for root adds, which the action does not use).
name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-cloudflare-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build profile (static export)
        run: pnpm exec nx build profile
        env:
          NEXT_PUBLIC_GTM_ID: ${{ secrets.NEXT_PUBLIC_GTM_ID }}
          NEXT_PUBLIC_CLARITY_ID: ${{ secrets.NEXT_PUBLIC_CLARITY_ID }}

      - name: Deploy Worker (static assets)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --cwd packages/profile
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Print deployment URL
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: echo "Deployed to $DEPLOYMENT_URL"
